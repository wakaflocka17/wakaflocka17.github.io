        url: "https://inclusiveteaching.it/index.php/inclusiveteaching/article/download/447/421"
      # - label: "Code"
      #  url: "https://github.com/mariorossi/paper"

  - title: "Confidential Retrieval-Augmented Generation in Educational Contexts"
    authors: "Boratto L., **Congiu F.**, Fenu G., Medda G., Pau M."
    venue: "WAILS"
    year: 2025
    links:
