  - title: "Confidentiality-Preserving Retrieval-Augmented Generation over Educational Resources"
    authors: "Boratto L., **Congiu F.**, Fenu G., Marras M."
    venue: "SIREM"
    year: 2025
    # url: "https://example.com/paper"      # optional: makes the title a link
    links:
